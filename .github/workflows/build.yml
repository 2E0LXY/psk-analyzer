name: Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian-compatible Ubuntu
            os: ubuntu-latest
            artifact: pskedge-deb
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            build: cmake --build build --config Release --parallel
            package: cmake --build build --target package --config Release
            artifact_path: build/*.deb
          - name: Windows
            os: windows-2022
            artifact: pskedge-windows
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
            build: cmake --build build --config Release --parallel
            package: cmake --build build --target package --config Release
            artifact_path: build/pskedge-*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          modules: qtmultimedia
          cache: true

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake dpkg-dev fakeroot ninja-build qt6-base-dev qt6-multimedia-dev

      - name: Check for WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if ($candle -and $light) {
            Write-Host "WiX Toolset v3 found: candle at $($candle.Source), light at $($light.Source)"
          } else {
            Write-Host "WiX Toolset v3 (candle.exe/light.exe) not found on PATH - installing via Chocolatey"
            choco install wixtoolset -y --no-progress
          }

      - name: Configure
        shell: bash
        run: ${{ matrix.configure }}

      - name: Build
        shell: bash
        run: ${{ matrix.build }}

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package
        shell: bash
        run: ${{ matrix.package }}

      - name: Show CPack/WiX logs on failure
        if: failure() && runner.os == 'Windows'
        shell: bash
        run: |
          echo "Package step failed - searching for any CPack/WiX log files (WiX's candle/light tools usually print errors directly to CPack's own output, unlike NSIS's separate log file, but checking anyway in case something is hidden):"
          find build -iname "*.log" -newer CMakeLists.txt -exec echo "--- {} ---" \; -exec cat {} \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with attached artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pskedge-deb/*.deb
            artifacts/pskedge-windows/pskedge-*.msi
          generate_release_notes: true
          draft: false
          prerelease: true
